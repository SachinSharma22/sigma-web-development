<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Color Generator</title>
    <style>
        h1 {
            text-align: center;
        }
        button {
            display: block;
            margin: 0 auto;
            margin-top: 2rem;
            padding: 1rem 2rem;
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
        }
        button:hover {
            background-color: #2c2828;
            color: #fff;
        }
        div {
            text-align: center;
            margin-top: 2rem;
            font-size: 2rem;
            font-weight: bold;
            border: 1px solid #000;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <h1>Random Color Generator</h1>
    <button>Generate</button>
    <div id="container">This is your new color</div>
    <script src="app.js"></script>
</body>
</html>
