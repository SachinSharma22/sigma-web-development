<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix India - Watch Shows Online, Watch Movies Online</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero-section">
      <nav class="login-sec">
        <img
          class="logo"
          src="./assests/images/Netflix_Logo_CMYK.png"
          alt="Netflix_Logo_Image"
        />
        <div class="language-sec">
          <select class="language" name="language" id="language">
            <option value="eng" selected>English</option>
            <option value="hindi">Hindi</option>
            <option value="spanish">Spanish</option>
            <option value="portuguese">Portuguese</option>
            <option value="german">German</option>
            <option value="french">French</option>
            <option value="italian">Italian</option>
            <option value="japanese">Japanese</option>
            <option value="chinese">Chinese</option>
          </select>
          <button class="btn-style">Sign In</button>
        </div>
      </nav>
      <section class="hero-content">
        <h1>Unlimited movies, TV shows and more.</h1>
        <h2>Watch anywhere. Cancel anytime.</h2>
        <p>
          Ready to watch? Enter your email to create or restart your membership.
        </p>
        <form action="/action">
          <input type="email" placeholder="Email address" required />
          <button class="btn-style">Get Started</button>
        </form>
      </section>
    </header>

    <main></main>
  </body>
</html>
