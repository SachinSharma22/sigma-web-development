<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./assets/logo.png" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <div class="sidebar">
        <div class="nav">
          <div class="nav-option" style="opacity: 1">
            <i class="fa-solid fa-house"></i>
            <a href="#">Home</a>
          </div>
          <div class="nav-option">
            <i class="fa-solid fa-magnifying-glass"></i>
            <a href="#">Search</a>
          </div>
        </div>
        <div class="library">
          <div class="options">
            <div class="lib-option nav-option">
              <img src="./assets/library_icon.png" alt="lib-icon" />
              <a href="#">Your Library</a>
            </div>
            <div class="icons">
              <i class="fa-solid fa-plus"></i>
              <i class="fa-solid fa-arrow-right"></i>
            </div>
          </div>
          <div class="lib-box">
            <div class="box">
              <div class="box-p1">Create your first playlist</div>
              <div class="box-p2">It's easy, We'll help you</div>
              <button class="bedge">Create playlist</button>
            </div>
            <div class="box">
              <div class="box-p1">Let's find some podcasts to follow</div>
              <div class="box-p2">We'll keep you updated on new episods</div>
              <button class="bedge">Browse podcasts</button>
            </div>
          </div>
        </div>
      </div>
      <div class="main-content">
        <div class="sticky-nav">
          <div class="sticky-nav-icons">
            <img src="./assets/backward_icon.png" alt="backward_icon" />
            <img src="./assets/forward_icon.png" alt="forward_icon" class="hide" />
          </div>
          <div class="sticky-nav-options">
            <button class="bedge hide">Explore Premium</button>
            <button class="bedge dark-bedge">
              <i class="fa-regular fa-circle-down"></i> Install App
            </button>
            <i class="fa-regular fa-user"></i>
          </div>
        </div>
        <div class="cards"></div>
      </div>
      <div class="music-player">musicplayer</div>
    </div>
  </body>
</html>
