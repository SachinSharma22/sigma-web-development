<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic table building practice</title>
  </head>
  <body>
    <table border="blue">
      <caption>
        Food Menu
      </caption>
      <thead>
        <tr>
          <th>Item</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Frooti</td>
          <td>10</td>
        </tr>
        <tr>
          <td>Samosa</td>
          <td>12</td>
        </tr>
        <tr>
          <td>Chips</td>
          <td>40</td>
        </tr>
      </tbody>
    </table>

    <!-- Second Table for colspan and rowspan -->
     <table border="1">
        <thead>
            <tr>
                <th rowspan="2">Item</th>
                <th colspan="2">Price</th>
            </tr>
            <tr>
                <th>INR</th>
                <th>USD</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Samosa</td>
                <td>10</td>
                <td>0.14</td>
            </tr>
            <tr>
                <td>Chips</td>
                <td>12</td>
                <td>0.16</td>
            </tr>
            <tr>
                <td>Frooti</td>
                <td>40</td>
                <td>0.8</td>
            </tr>
        </tbody>
     </table>
  </body>
</html>
