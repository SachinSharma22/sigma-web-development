<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slack AI | Create your account on Slack</title>
</head>
<body>
    <figure>
        <img src="./images/slack_logo.png" alt="slack_logo_image">
    </figure>
    <form action="_blank">
        <article>
            <h1>Sign Up</h1>
            <p>Please sign in to continue</p>
        </article>
        <article>
            <input type="text" name="name" id="name" placeholder="Name" required>
            <input type="email" name="email" id="email" placeholder="Email" required>
            <input type="text" name="pass" id="pass" placeholder="Password" required>
        </article>
        <a href="#forget-password">Forget password?</a>

        <article>
            <button type="submit">Sign Up</button>
        </article>

        <article>
            <p>Already have an account? <a href="./login.html">click here</a></p>
        </article>
    </form>
</body>
</html>
