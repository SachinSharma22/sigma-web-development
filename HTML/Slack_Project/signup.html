<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <title>Slack AI | Create your account on Slack</title>
  </head>
  <body>
    <a href="./index.html">
      <img src="./images/slack_logo.png" alt="slack_logo_image" />
    </a>
    <main>
      <form action="_blank">
        <article>
          <h1>Sign Up</h1>
          <p>Please sign in to continue</p>
        </article>
        <article>
          <div class="user-name">
            <i class="fa-solid fa-user"></i>
            <input
              type="text"
              name="name"
              id="name"
              placeholder="Name"
              required
            />
          </div>
          <div class="user-email">
            <i class="fa-solid fa-envelope"></i>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Email"
              required
            />
          </div>
          <div class="user-pass">
            <i class="fa-solid fa-lock"></i>
            <input
              type="password"
              name="pass"
              id="pass"
              placeholder="Password"
              required
            />
          </div>
        </article>
        <a href="#forget-password">Forget password?</a>

        <article>
          <button type="submit">Sign Up</button>
        </article>

        <article>
          <p>Already have an account? <a href="./login.html">click here</a></p>
        </article>
      </form>
    </main>
    <footer>
      <div>
        <ul>
          <li>Features</li>
          <li>Solutions</li>
          <li>Enterpise</li>
          <li>Resources</li>
          <li>Pricing</li>
        </ul>
      </div>
      <div>
        <ul>
          <li><a href="./login.html">sign in</a></li>
          <li><a href="./demo.html">Request a demo</a></li>
          <li><a href="./signup.html">Get started</a></li>
        </ul>
      </div>
    </footer>
  </body>
</html>
